services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafio_tecnico

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desafio_tecnico"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/desafio_tecnico?schema=public
      JWT_SECRET: desafio-tecnico-jwt-secret
      JWT_EXPIRATION: 24h
      PORT: 3001

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  postgres_data: