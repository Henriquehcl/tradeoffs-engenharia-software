# ===========================================================================
# GitHub Actions CI/CD Pipeline
# ===========================================================================
#
# Pipeline automatizado que executa a cada push e pull request.
#
# Jobs:
# 1. backend: Instala deps → lint → testes → build
# 2. frontend: Instala deps → lint → build
#
# O pipeline garante que:
# - O código compila sem erros
# - Os testes passam
# - O linting está em conformidade
# - O build de produção é gerado com sucesso
# ===========================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===== Backend Job =====
  backend:
    name: Backend - Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      # PostgreSQL para testes de integração
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: desafio_tecnico_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar linting
        run: npm run lint

      - name: Rodar testes unitários
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_tecnico_test
          JWT_SECRET: test-secret
          JWT_EXPIRATION: 1h

      - name: Rodar testes E2E
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_tecnico_test
          JWT_SECRET: test-secret
          JWT_EXPIRATION: 1h

      - name: Build de produção
        run: npm run build

  # ===== Frontend Job =====
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
