# ===========================================================================
# Nginx Configuration - Frontend
# ===========================================================================
#
# Configuração do nginx para servir a aplicação React em produção.
#
# Funcionalidades:
# 1. Serve arquivos estáticos do Vite build
# 2. Proxy reverso de /api/* para o container backend
# 3. Fallback para index.html (SPA routing)
# 4. Compressão gzip para performance
# 5. Cache de assets estáticos
# ===========================================================================

server {
    listen 80;
    server_name localhost;

    # Diretório raiz com os arquivos estáticos do React
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para reduzir tamanho das respostas
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Proxy reverso para o backend
    # Todas as requisições /api/* são redirecionadas para o serviço backend
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache de assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback para SPA routing
    # Qualquer rota não encontrada retorna index.html
    # para que o React Router gerencie a navegação
    location / {
        try_files $uri $uri/ /index.html;
    }
}
